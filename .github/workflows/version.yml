name: bump-version

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    if: ${{ !startsWith(github.event.head_commit.message, 'bump version to') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment minor version
        id: bump
        run: |
          current=$(cat version.txt | tr -d '[:space:]')
          major=${current%.*}
          minor=${current#*.}
          if ! [[ "$major" =~ ^[0-9]+$ ]] || ! [[ "$minor" =~ ^[0-9]+$ ]]; then
            echo "::error::version.txt content is not MAJOR.MINOR: $current"
            exit 1
          fi
          new_minor=$((minor + 1))
          new="${major}.${new_minor}"
          echo "$new" > version.txt
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "Bumped $current -> $new"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "bump version to ${{ steps.bump.outputs.version }}"
          git push

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
